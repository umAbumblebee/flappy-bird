<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Main Game Area -->
    <div class="game-container">
        <!-- The Game Canvas (Required for engine.js) -->
        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <!-- UI / Score Overlay -->
        <div id="score">
            <h1><span>High Score: 0</span></h1>
            <h2>Score: _ _</h2>
        </div> 

        <!-- Pipe Columns -->
        <div id="columns"></div>
        
        <!-- Custom Player Component -->
        <game-image src="/assets/images/bird.png" trim="true"></game-image>
    </div>

    <!-- Ground Boundary -->
    <div id="ground"></div>

    <!-- Scripts -->
    <!-- Load the custom web component first -->
    <script type="module" src="/image-module/image.js"></script>
    <!-- Load the game logic -->
    <script src="/js/engine.js"></script>
</body>
</html>
